openapi: 3.1.0
info:
  title: CommOS API
  version: 0.3.0
  description: >
    The CommOS control-plane API (Volume 4). Every capability of the platform is
    available here; the UI, CLI, mobile app, and Terraform provider are clients of
    this same API (CMOS-00-ENG-003). This document is a skeleton for v0.3: it fixes
    conventions and the core resource surface. Entity/event shapes are defined in
    ../json-schema and referenced here.
  license:
    name: TBD (see ADR-0009)
servers:
  - url: https://{host}/v1
    variables:
      host: { default: pbx.example.com }

# ---- Cross-cutting conventions (normative; Volume 4) ----------------------------
security:
  - bearerAuth: []
  - apiKey: []

tags:
  - { name: people, description: Organisations, users, identities }
  - { name: devices, description: Device lifecycle & provisioning }
  - { name: routing, description: Routes, call flows, calls }
  - { name: billing, description: CDRs and exports }
  - { name: integration, description: Webhooks, automations, AI jobs, plugins }
  - { name: stream, description: Real-time events }

paths:
  /users:
    get:
      tags: [people]
      operationId: listUsers
      summary: List users (cursor-paginated)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200': { $ref: '#/components/responses/UserPage' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [people]
      operationId: createUser
      summary: Create (invite) a user — emits UserCreated
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../json-schema/entities/User.schema.json' }
      responses:
        '201': { $ref: '#/components/responses/User' }
        default: { $ref: '#/components/responses/Problem' }

  /users/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [people]
      operationId: getUser
      responses:
        '200': { $ref: '#/components/responses/User' }
        default: { $ref: '#/components/responses/Problem' }
    patch:
      tags: [people]
      operationId: updateUser
      description: JSON Merge Patch (RFC 7386). Requires If-Match with the entity version.
      parameters: [ { $ref: '#/components/parameters/IfMatch' } ]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { type: object }
      responses:
        '200': { $ref: '#/components/responses/User' }
        '412': { $ref: '#/components/responses/Problem' }
        default: { $ref: '#/components/responses/Problem' }

  /identities:authenticate:
    post:
      tags: [people]
      operationId: authenticateIdentity
      summary: Authenticate an identity — emits AuthenticationSucceeded/Failed, IdentityAuthenticated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string }
                device_id: { type: string }
                method: { type: string, enum: [PIN, RFID, NFC, QR, BLUETOOTH, FIDO2, PROXIMITY, FACE, SSO, OIDC, SAML, LDAP] }
                credential: { type: string, description: Method-specific secret; never logged/echoed }
              required: [method]
      responses:
        '201': { description: Identity established, content: { application/json: { schema: { $ref: '../json-schema/entities/Identity.schema.json' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        default: { $ref: '#/components/responses/Problem' }

  /devices:
    get:
      tags: [devices]
      operationId: listDevices
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - { name: state, in: query, schema: { type: string } }
      responses:
        '200': { description: Page of devices, content: { application/json: { schema: { $ref: '#/components/schemas/DevicePage' } } } }
        default: { $ref: '#/components/responses/Problem' }

  /devices/{id}:approve:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [devices]
      operationId: approveDevice
      summary: Approve a detected device — emits DeviceApproved. Capability provision.devices.
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '200': { description: Device approved, content: { application/json: { schema: { $ref: '../json-schema/entities/Device.schema.json' } } } }
        '403': { $ref: '#/components/responses/Problem' }
        default: { $ref: '#/components/responses/Problem' }

  /calls:
    post:
      tags: [routing]
      operationId: originateCall
      summary: Originate a call — emits CallStarted. Capability calls.originate.
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from_ref: { type: string }
                to_ref: { type: string }
                device_id: { type: string }
              required: [from_ref, to_ref]
      responses:
        '201': { description: Call created, content: { application/json: { schema: { $ref: '../json-schema/entities/Call.schema.json' } } } }
        default: { $ref: '#/components/responses/Problem' }

  /calls/{id}:hangup:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [routing]
      operationId: hangupCall
      summary: End a call — emits CallEnded. Capability calls.control.
      responses:
        '202': { description: Hangup accepted }
        default: { $ref: '#/components/responses/Problem' }

  /cdrs:
    get:
      tags: [billing]
      operationId: listCdrs
      summary: List call detail records. Capability billing.view.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200': { description: Page of CDRs, content: { application/json: { schema: { $ref: '#/components/schemas/CdrPage' } } } }
        default: { $ref: '#/components/responses/Problem' }

  /webhooks:
    get:
      tags: [integration]
      operationId: listWebhooks
      responses:
        '200': { description: Webhooks }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [integration]
      operationId: createWebhook
      summary: Register an event subscription. Capability integrations.manage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, format: uri }
                event_types: { type: array, items: { type: string } }
              required: [url, event_types]
      responses:
        '201': { description: Webhook created }
        default: { $ref: '#/components/responses/Problem' }

  /stream:
    get:
      tags: [stream]
      operationId: stream
      summary: WebSocket upgrade — subscribe to the Volume 5 event envelope stream.
      description: Upgrades to WebSocket. Frames carry the event envelope (../json-schema/envelope.schema.json).
      responses:
        '101': { description: Switching Protocols (WebSocket) }

  /events/schemas:
    get:
      tags: [stream]
      operationId: eventSchemas
      summary: Event schema registry — MUST match contracts/json-schema/events for this version.
      responses:
        '200': { description: Map of event type to JSON Schema }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    apiKey: { type: apiKey, in: header, name: X-Api-Key }

  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string } }
    Limit: { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
    Cursor: { name: cursor, in: query, schema: { type: string } }
    IdempotencyKey: { name: Idempotency-Key, in: header, schema: { type: string } }
    IfMatch: { name: If-Match, in: header, schema: { type: string }, description: Entity version for optimistic concurrency }

  schemas:
    Problem:
      description: RFC 9457 Problem Details (Volume 4 §5)
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code: { type: string, description: Stable machine code (forbidden, validation_failed, conflict, …) }
        correlation_id: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
      required: [title, status, code]
    Page:
      type: object
      properties:
        items: { type: array }
        next_cursor: { type: [string, "null"] }
      required: [items, next_cursor]
    UserPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items: { type: array, items: { $ref: '../json-schema/entities/User.schema.json' } }
    DevicePage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items: { type: array, items: { $ref: '../json-schema/entities/Device.schema.json' } }
    CdrPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items: { type: array, items: { $ref: '../json-schema/entities/CDR.schema.json' } }

  responses:
    Problem:
      description: Error (RFC 9457)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    User:
      description: A user
      content:
        application/json:
          schema: { $ref: '../json-schema/entities/User.schema.json' }
    UserPage:
      description: A page of users
      content:
        application/json:
          schema: { $ref: '#/components/schemas/UserPage' }
