# CommOS runtime configuration — pbx.yaml  (config-as-code, Vol 14 §10; CMOS-14-DEP-080)
#
# Copy to your host, edit, and run:   commosd --config /etc/commos/pbx.yaml
# With no --config, commosd reads ./pbx.yaml from the working directory; if none is found it
# boots on built-in defaults (loopback — no phones).
#
# Secrets are NEVER inlined (CMOS-14-DEP-083): sip_tls_key / database_url / jwt_secret /
# admin_password take a reference — { ref_uri: "env://VAR" } or { ref_uri: "file:///path" } —
# resolved at boot. An inline secret (e.g. a DSN with a password) is rejected.
#
# As shipped, this file runs anywhere for a LOCAL test (binds all interfaces, loopback media,
# SQLite in the working directory). For real phones you MUST set media_ip — see the note below.

# ── Network ──────────────────────────────────────────────────────────────────
listen:      "0.0.0.0:8080"     # HTTP API + phone auto-provisioning (/provision)
sip_listen:  "0.0.0.0:5060"     # SIP/UDP ingress (null disables the SIP plane)
media_ip:    "127.0.0.1"        # RTP address advertised to phones. 127.0.0.1 = LOCAL TEST ONLY:
                                # real phones will connect with NO AUDIO. Set it to THIS host's
                                # LAN IP. It is also written into provisioned phone configs as the
                                # SIP registrar, so phones both send RTP and REGISTER here.
#
# Multi-homed host? Pin SIP + media to the phone-facing interface, and leave the HTTP API on all
# interfaces so you can still administer it from a management network:
#     listen:     "0.0.0.0:8080"
#     sip_listen: "192.168.10.1:5060"     # phone-facing NIC → deterministic SIP reply source
#     media_ip:   "192.168.10.1"          # same interface — phones send RTP to it
# Find the right IP with:   ip -o -4 addr show   /   ip route get <a-phone-ip>

# ── Time / NTP (for provisioned phones on an isolated, offline network) ────────
# Phones with no Internet can't reach public NTP, so their clocks drift. These settings are
# written into the auto-provisioned phone configs so handsets sync time from an INTERNAL source
# and display the correct LOCAL time. They do not affect the CommOS host's own clock.
# ntp_server: "192.168.10.1"   # internal NTP server for phones. Unset → phones use media_ip
#                              # (run an NTP service on this host, e.g. chrony with `allow`).
# timezone:   "PST8PDT"        # POSIX TZ string. Unset → no timezone is sent (clock shows UTC).
#                              # Examples: "GMT0" (UTC), "GMT-5" (India, +5:30 needs "IST-5:30"),
#                              # "CET-1CEST" (Central Europe), "EST5EDT" (US Eastern).

# ── Phone lockdown (guest-facing / hospitality) ───────────────────────────────
# Web-UI admin password pushed into every provisioned phone so a guest can't open the handset's
# web page with the factory admin/admin and change SIP/network/dial settings. Referenced, never
# inline (CMOS-14-DEP-083). Re-asserted on every re-provision, so a checkout re-provision (reboot
# the phone) restores the locked baseline. Applied to Yealink + Grandstream; the generic form has
# no portable key so it's skipped there. Unset → the phone's existing web password is left as-is.
# phone_admin_password: { ref_uri: "file:///run/secrets/phone_admin" }   # or env://PHONE_ADMIN_PW

# Optional SIP-over-TLS (SIPS) — requires a build with `--features tls`.
# sips_listen:  "0.0.0.0:5061"
# sip_tls_cert: "/etc/commos/tls/fullchain.pem"                 # public cert chain (plain path)
# sip_tls_key:  { ref_uri: "file:///etc/commos/tls/key.pem" }   # private key by reference

# ── Media / security ─────────────────────────────────────────────────────────
srtp:              true    # encrypt RTP (SRTP/SDES) when a phone offers RTP/SAVP. Plain callers unaffected.
trunk_srtp:        false   # also offer SRTP to a carrier trunk. Off keeps the carrier leg plaintext so trunk calls never break.
record_calls:      false   # capture call audio as stored objects on hangup.
voicemail_enabled: true    # record-on-no-answer for internal extensions, plus MWI.
no_answer_rings:   5       # rings before an unanswered call diverts to voicemail (~6s each, so 5 ≈ 30s).

# ── Voicemail-to-email (optional) ────────────────────────────────────────────
# When `smtp:` is set, each new voicemail is emailed to the mailbox owner, matched by the
# dialled extension number in `mailboxes`. Plaintext submission to a trusted relay only
# (STARTTLS to an external provider is a documented add behind the `tls` feature). The relay
# password is a reference, never inline. Omit the whole block to disable the feature.
# smtp:
#   host:  "127.0.0.1"        # SMTP relay host (e.g. a local Postfix).
#   port:  25                 # 25 = SMTP, 587 = submission.
#   from:  "voicemail@example.com"
#   # username: "commos"                                   # optional AUTH LOGIN username…
#   # password: { ref_uri: "file:///run/secrets/smtp_pw" } # …paired with a referenced password.
#   attach_audio: true        # attach the message as a WAV (μ-law).
#   mailboxes:                # extension number → recipient(s); comma-separate for several.
#     "100": "alice@example.com"
#     "101": "bob@example.com, team@example.com"

# ── Auth ─────────────────────────────────────────────────────────────────────
# Secure-by-default with zero setup: security is gated by the *source address*, not by flags you
# have to remember. From loopback/private-LAN peers the dev bearer, dashboard, introspection, and
# phone provisioning just work; from a PUBLIC address those are refused (a signed JWT is required
# for /v1, an admin session for privileged routes, and SIP auth is auto-required). A JWT signing
# secret is auto-generated at {data_dir}/secrets/jwt.key if `jwt_secret` is unset.
require_sip_auth: false     # true → ALWAYS require SIP digest auth. Even when false, auth is auto-required for any non-LAN source.
sip_realm:        "commos"  # digest realm presented in the auth challenge.
dev_tokens:       true      # accept the `tenant:<uuid>` dev bearer — honoured from LAN/loopback peers only, never from a public address.
# jwt_secret:     { ref_uri: "env://COMMOS_JWT_SECRET" }            # override the auto-generated HS256 signing key for /v1 bearer tokens.
# admin_password: { ref_uri: "file:///etc/commos/admin_password" }  # gates admin AND the operator console.
#   When set, the console (/dashboard, /onboarding, /metrics, /info, /_introspect) requires HTTP
#   Basic auth against this password (the browser prompts; username is ignored) — the same secret
#   as /admin/login, so one credential guards viewing and acting. When UNSET, the console is
#   reachable from the LAN/loopback only. scripts/install.sh generates a strong random one by
#   default (--no-admin-password to opt out).

# ── Storage ──────────────────────────────────────────────────────────────────
data_dir: "."   # SQLite DB (commos.db) + local object store live here. Use an absolute path in production.
# sounds_dir: "/var/lib/commos/sounds"   # audio prompts (<dir>/en/*.ulaw). Unset → {data_dir}/sounds,
#                                        # where scripts/install.sh downloads the public FreePBX pack.
#                                        # Missing files fall back to a synthesized beep.
# display_name_file: "/var/lib/commos/display_name.txt"  # text shown on a called phone as the calling
#                                        # party (instead of "commos"). Unset → {data_dir}/display_name.txt.
#                                        # One line = that text always; multiple lines = one picked per
#                                        # call (rotating messages). Absent/empty → "commos". Re-read per
#                                        # call, so edits apply without a restart.
# database_url:   { ref_uri: "env://DATABASE_URL" }   # unset → embedded SQLite (durable, zero-dep). postgres:// for HA; memory:// for tests.
#   Rejected (secret inline):  database_url: postgres://user:password@db:5432/commos
# object_storage: "s3://my-bucket"                    # unset → filesystem under {data_dir}/objects. S3 needs a `--features s3` build.

# ── Dialplan ─────────────────────────────────────────────────────────────────
default_country_code: "1"    # digits, no '+'. National vs international classification for trunk routing / E.164.
allow_international:   false  # permit dialing outside default_country_code.
# max_concurrent_calls: 100  # per-tenant in-progress-call cap. Unset → no cap.

# ── Logging ──────────────────────────────────────────────────────────────────
log:
  format: json   # json (structured) | text (human)
  level:  info   # trace|debug|info|warn|error  (RUST_LOG env overrides)
