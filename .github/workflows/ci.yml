name: ci

# Health gate for the reference implementation on every push and PR. The tag-triggered
# multi-architecture publish lives in release.yml; this keeps `main` releasable by proving
# the workspace builds, tests, and lints on amd64 — and cross-compiles for every published
# architecture — before a tag is ever cut.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# A PR'd feature branch is validated once (via the pull_request event); push CI is reserved for
# the default branch and release tags. Keying concurrency on head_ref (falling back to ref for
# push builds) cancels superseded runs whichever event triggered them.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build · test · clippy (amd64)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference
      # The project's quality bar: clippy is clean under -D warnings (rustfmt is intentionally
      # not enforced — the code uses deliberately wide lines).
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Build (release, native — default features incl. S3)
        run: cargo build --release --locked --bin commosd
      - name: Build (opt-out — no S3, leanest pure-Rust binary)
        run: cargo build --locked --no-default-features --bin commosd

  cross:
    name: cross-compile ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every published architecture is compile-checked, so a tag never surprises us. Two
        # targets are covered by dedicated jobs and deliberately omitted here to avoid a second
        # compile of the same target: amd64-gnu (the native `check` job) and aarch64-gnu (the
        # `parity-arm64` job, which compiles *and* runs the suite under qemu).
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
    defaults:
      run:
        working-directory: reference
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Set up cross toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference
          key: ${{ matrix.target }}
      - name: Compile-check
        run: cargo build --locked --target ${{ matrix.target }} --bin commosd

  parity-arm64:
    name: behaviour parity (arm64 under qemu)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + arm64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Set up cross toolchain + qemu
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference
          key: parity-aarch64
      # CMOS-14-DEP-060: conformance evidence must cover both arm64 and amd64, since
      # media/codec paths are architecture-sensitive. The `check` job is the amd64 half;
      # this runs the same suite for arm64 under qemu.
      - name: Test suite under qemu (arm64)
        run: cargo test --locked --target aarch64-unknown-linux-gnu
