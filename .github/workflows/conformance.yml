name: conformance

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Feature branches are validated once via the pull_request event; push runs are reserved for the
# default branch and tags. Cancel superseded runs regardless of which event triggered them.
concurrency:
  group: conformance-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Validate contracts (spec-first)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install harness dependencies
        run: python3 -m pip install --quiet jsonschema pyyaml
      - name: Run conformance harness
        run: python3 conformance/run.py
